# Training Configuration for Few-Shot Ocular Lesion Segmentation

# Data paths
data:
  train_images: "./data/train/images"
  train_masks: "./data/train/masks"
  val_images: "./data/val/images"
  val_masks: "./data/val/masks"
  test_images: "./data/test/images"
  test_masks: "./data/test/masks"

# Model configuration
model:
  type: "vit_b"  # vit_b, vit_l, vit_h
  checkpoint: null  # Path to pretrained checkpoint
  num_prompts: 10
  freeze_image_encoder: true
  freeze_prompt_encoder: false

# Few-shot learning
few_shot:
  enabled: true
  k_shot: 5  # Number of support examples
  n_query: 1  # Number of query examples
  num_episodes: 1000  # Episodes per epoch

# Training hyperparameters
training:
  epochs: 100
  batch_size: 2
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: "adamw"
  
  # Loss weights
  loss:
    bce_weight: 0.5
    dice_weight: 0.5

# Data augmentation
augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  rotation: 15
  scale_limit: 0.1
  shift_limit: 0.1
  brightness_limit: 0.2
  contrast_limit: 0.2

# Image settings
image:
  size: [1024, 1024]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Checkpointing
checkpoint:
  save_dir: "./checkpoints"
  save_frequency: 5  # Save every N epochs
  keep_best: true

# Logging
logging:
  log_dir: "./logs"
  tensorboard: true
  print_frequency: 10  # Print every N batches

# Device
device: "cuda"  # cuda or cpu
num_workers: 4
pin_memory: true
