version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ocular-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/results:/app/results
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  frontend:
    build: ./frontend
    container_name: ocular-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: always
